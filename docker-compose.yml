services:
  mysql:
    image: mysql:8.0
    container_name: managebac-mcp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-managebac_mcp}
      MYSQL_USER: ${MYSQL_USER:-managebac}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - managebac_mcp_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  managebac_mcp_mysql_data:
